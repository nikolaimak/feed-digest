<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Feed Digest</title>
<style>body{font-family:system-ui;max-width:600px;margin:40px auto;padding:0 16px;color:#333}a{color:#1d9bf0}h1{font-size:1.5rem}ul{list-style:none;padding:0}li{margin:8px 0}li a{font-size:1.1rem}</style>
</head><body>
<h1>📰 Feed Digest</h1>
<p>Auto-generated daily digests.</p>
<div id="list"></div>
<script>
// Auto-list HTML files from directory (GitHub Pages doesn't support directory listing,
// so we maintain a manifest)
fetch('manifest.json').then(r=>r.json()).then(files=>{
  const ul=document.createElement('ul');
  files.reverse().forEach(f=>{
    const li=document.createElement('li');
    li.innerHTML=`<a href="${f}">${f.replace('.html','')}</a>`;
    ul.appendChild(li);
  });
  document.getElementById('list').appendChild(ul);
}).catch(()=>{document.getElementById('list').innerHTML='<p>No digests yet.</p>'});
</script>
</body></html>
